- name: Set system timezone
  ansible.builtin.timezone:
    name: "{{ timezone }}"
  when: ansible_service_mgr == "systemd"

- name: Set system timezone for non-systemd systems
  file:
    src: "/usr/share/zoneinfo/{{ timezone }}"
    dest: /etc/localtime
    state: link
    force: yes
  when: ansible_service_mgr != "systemd"

