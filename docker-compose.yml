services:
  controller:
    image: unihooshyar/ansible-controller
    container_name: controller
    hostname: controller
    
    ports:
      - "2222:22"
      - "7681:7681"   # ttyd web terminal

    volumes:
      - ./ansible.cfg:/home/ansible/ansible.cfg
      - ./inventory:/home/ansible/inventory
      - ./playbooks:/home/ansible/playbooks
      - ./shared:/home/ansible/shared
      - ./roles:/home/ansible/roles

    working_dir: /home/ansible

    networks:
      - ansible-net

  
  ubuntu:
    image: unihooshyar/managed-node-ubuntu
    container_name: ubuntu
    hostname: ubuntu
    ports:
      - "2223:22"
    networks:
      - ansible-net

  debian:
    image: unihooshyar/managed-node-debian
    container_name: debian
    hostname: debian
    ports:
      - "2224:22"
    networks:
      - ansible-net

  centos:
    image: unihooshyar/managed-node-centos
    container_name: centos
    hostname: centos
    ports:
      - "2225:22"
  
    networks:
      - ansible-net

  rocky:
    image: unihooshyar/managed-node-rocky
    container_name: rocky
    hostname: rocky
    ports:
      - "2226:22"
    
    networks:
      - ansible-net

  oracle:
    image: unihooshyar/managed-node-oracle
    container_name: oracle
    hostname: oracle
    ports:
      - "2227:22"
    
    networks:
      - ansible-net

  suse:
    image: unihooshyar/managed-node-suse
    container_name: suse
    hostname: suse
    ports:
      - "2228:22"
    
    networks:
      - ansible-net
  

networks:
  ansible-net:
   name: ansible-net